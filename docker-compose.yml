x-backend-environment: &backend-environment
  APP_ENVIRONMENT: ${APP_ENVIRONMENT:-development}
  DATABASE_URL: postgresql+psycopg2://${POSTGRES_USER:-nocodeml}:${POSTGRES_PASSWORD:-dev-only-password}@postgres:5432/${POSTGRES_DB:-nocodeml}
  REDIS_URL: redis://redis:6379/0
  STORAGE_DIR: /app/storage
  STORAGE_BACKEND: ${STORAGE_BACKEND:-minio}
  MINIO_ENDPOINT: minio:9000
  MINIO_PUBLIC_ENDPOINT: ${MINIO_PUBLIC_ENDPOINT:-localhost:9000}
  MINIO_ACCESS_KEY: ${MINIO_ACCESS_KEY:-nocodeml-dev}
  MINIO_SECRET_KEY: ${MINIO_SECRET_KEY:-dev-only-minio-password}
  MINIO_SECURE: ${MINIO_SECURE:-false}
  ARTIFACT_BUCKET: ${ARTIFACT_BUCKET:-iota-artifacts}
  AUTH_SECRET: ${AUTH_SECRET:-dev-only-auth-secret-change-me}
  CORS_ORIGINS: ${CORS_ORIGINS:-http://localhost:5174}
  OPENAI_API_KEY: ${OPENAI_API_KEY:-}
  OPENAI_MODEL: ${OPENAI_MODEL:-gpt-4o-mini}
  USER_FILE: ${USER_FILE:-/app/app/data/user.json}
  JOB_DEFAULT_TIMEOUT_SECONDS: ${JOB_DEFAULT_TIMEOUT_SECONDS:-7200}
  JOB_WORKER_CONCURRENCY: ${JOB_WORKER_CONCURRENCY:-2}
  JOB_NETWORK_DISABLED: ${JOB_NETWORK_DISABLED:-true}
  JOB_USE_FORK_FAST_PATH: ${JOB_USE_FORK_FAST_PATH:-true}
  JOB_MEMORY_LIMIT_MB: ${JOB_MEMORY_LIMIT_MB:-4096}
  JOB_CPU_LIMIT_SECONDS: ${JOB_CPU_LIMIT_SECONDS:-7200}
  NODE_CACHE_ENABLED: ${NODE_CACHE_ENABLED:-true}
  NODE_CACHE_RETENTION_DAYS: ${NODE_CACHE_RETENTION_DAYS:-30}
  NODE_CACHE_COMPRESSION: ${NODE_CACHE_COMPRESSION:-3}
  WORKFLOW_VERSION_LIMIT: ${WORKFLOW_VERSION_LIMIT:-100}

services:
  postgres:
    image: postgres:16.4-alpine3.20
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-nocodeml}
      POSTGRES_USER: ${POSTGRES_USER:-nocodeml}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-dev-only-password}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 20
    restart: unless-stopped
    networks: [backend]

  redis:
    image: redis:7.4.1-alpine3.20
    command: ["redis-server", "--appendonly", "yes", "--save", "60", "1"]
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 20
    restart: unless-stopped
    networks: [backend]

  minio:
    image: minio/minio:RELEASE.2025-04-22T22-12-26Z
    command: ["server", "/data", "--console-address", ":9001"]
    environment:
      MINIO_ROOT_USER: ${MINIO_ACCESS_KEY:-nocodeml-dev}
      MINIO_ROOT_PASSWORD: ${MINIO_SECRET_KEY:-dev-only-minio-password}
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 5s
      timeout: 5s
      retries: 20
    restart: unless-stopped
    networks: [backend]

  migrate:
    build:
      context: ./backend
    command: ["alembic", "upgrade", "head"]
    environment: *backend-environment
    depends_on:
      postgres:
        condition: service_healthy
    restart: "no"
    networks: [backend]

  storage-init:
    build:
      context: ./backend
    user: "0:0"
    command: ["sh", "-c", "mkdir -p /app/storage && chown -R 10001:10001 /app/storage"]
    volumes:
      - backend_storage:/app/storage
    restart: "no"
    network_mode: "none"

  api:
    build:
      context: ./backend
    command: ["uvicorn", "app.main:app", "--host", "0.0.0.0", "--port", "8000", "--workers", "2", "--proxy-headers"]
    environment: *backend-environment
    volumes:
      - backend_storage:/app/storage
    depends_on:
      migrate:
        condition: service_completed_successfully
      storage-init:
        condition: service_completed_successfully
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health/ready', timeout=3)"]
      interval: 10s
      timeout: 5s
      retries: 12
    restart: unless-stopped
    init: true
    networks: [backend]

  worker:
    build:
      context: ./backend
    command: ["python", "worker.py"]
    environment:
      <<: *backend-environment
      WORKER_ID: ${WORKER_ID:-worker-1}
      OPENBLAS_NUM_THREADS: "1"
      OMP_NUM_THREADS: "1"
      MKL_NUM_THREADS: "1"
      NUMEXPR_NUM_THREADS: "1"
    volumes:
      - backend_storage:/app/storage
    depends_on:
      migrate:
        condition: service_completed_successfully
      storage-init:
        condition: service_completed_successfully
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
    restart: unless-stopped
    init: true
    stop_grace_period: 30s
    networks: [backend]

  frontend:
    build:
      context: ./frontend
      target: production
      args:
        VITE_API_URL: ${VITE_API_URL:-}
        VITE_AMCHARTS_LICENSE_KEY: ${VITE_AMCHARTS_LICENSE_KEY:-}
    restart: unless-stopped
    networks: [backend]

volumes:
  postgres_data:
  redis_data:
  backend_storage:
  minio_data:

networks:
  backend:
